<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>우리들의 게임나라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>
<div id="app">
  <section id="screen-home" class="screen active">
    <h1 class="home-title">🎠 우리들의 게임나라</h1>
    <div id="home-grid"></div>
  </section>
</div>
<script>
  // 파일 변경이 항상 반영되도록 버전 쿼리를 붙여 순서대로 로드
  var V = 'v=5';
  var FILES = ['audio','main','player','score','cartoon','templates','balloon','memory','paint','mole','rhythm','aquarium','coloring','habitat','frog','colormatch','counting','shadow','simon','hangul-data','hangul','garden'];
  (function load(i){
    if (i >= FILES.length) { GameShell.boot(); return; }
    var s = document.createElement('script');
    s.src = 'js/' + FILES[i] + '.js?' + V;
    s.onload = function(){ load(i + 1); };
    document.body.appendChild(s);
  })(0);
</script>
</body>
</html>
